    <div class="container">
        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-header">
                        <h2 class="table-title">N-AccessCount</h2>
                        <div class="func-wrapper">
                        <button class="add-button btn-primary" (click)="addHandler()">Add</button>
                            <div class="filter-wrapper">
                                <!-- <select name="" id="" class="dd-filter-1">
                                    <option value="">UID</option>
                                    <option value="">email</option>
                                    <option value="">username</option>
                                </select> -->
                                
                                <div class="filter-inputgroup">
                                    <input  class="filter-input" type="number" required>
                                    <label for="">ymd</label>
                                </div>
                                <div class="filter-inputgroup">
                                    <input  class="filter-input" type="number" class="filter-input" required>
                                    <label for="">chihou_id</label>
                                </div>
                                <div class="filter-inputgroup">
                                    <input  class="filter-input" type="number" class="filter-input" required>
                                    <label for="">type</label>
                                </div>
                                <div class="filter-inputgroup">
                                    <input  class="filter-input" type="number" class="filter-input" required>
                                    <label for="">page_id</label>
                                </div>
                                <!-- <input type="text" class="filter-input"> -->

                                <button class="filter-btn">Filter</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-wrapper">
                            <table class="table table-bordered text-center">
                                <thead>
                                    <tr>
                                        <th scope="col">ymd</th>
                                        <th scope="col">chihou_id</th>
                                        <th scope="col">type</th>
                                        <th scope="col">page_id</th>
                                        <th scope="col">total</th>
                                        <th scope="col"></th>
                                    </tr>
                                </thead>

                                <tbody>
                                    @for (item of this.pageData(); track item.ymd) {
                                        <tr>
                                            <td>{{item.ymd}}</td>
                                            <td>{{item.chihou_id}}</td>
                                            <td>{{item.type}}</td>
                                            <td>{{item.page_id}}</td>
                                            <td>{{item.total}}</td>
                                            <td>
                                                <div class="btn-container cmd-btn">
                                                    <button class="edit-btn" (click)="editHandler(item.ymd.toString())">Edit</button>
                                                    <button class="del-btn" (click)="deleteHandler(item.ymd.toString())">Delete</button>                            
                                                </div>
                                            </td>
                                        </tr>
                                    } 
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card-action p-2 page-card-div">

                        <div class="rpp-div">
                            <span class="rpp-text">Result per page</span>
                            <select class="rpp-dropdown" [value]="selectedPagesize()" (change)="onChange($event)">
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="30">30</option>
                                <option value="40">40</option>
                                <option value="50">50</option>
                            </select>
                        </div>

                        <div class="page-div">
                            <button class="btn-page btn-primary" (click)="prevPage()" [disabled]="currentPage() === 1">
                                Previous
                            </button>
                            <span class="span-page-text">Page {{currentPage()}} of {{this.accessCountService.dataList().totalPages}}</span>
                            <button class="btn-page btn-primary" (click)="nextPage()" [disabled]="currentPage() === this.accessCountService.dataList().totalPages">
                                Next
                            </button>
                        </div>

                        <div class="page-input-div">
                            <span class="span-page-go">Page</span>
                            <input class="go-page-input" type="number" [value]="pageInput()" (input)="updateInputPage($any($event.target).value)" min="1"/>
                            <button class="btn-go-page btn-primary" (click)="getPage()" [disabled]="currentPage() === this.accessCountService.dataList().totalPages">
                                Go
                            </button>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>
