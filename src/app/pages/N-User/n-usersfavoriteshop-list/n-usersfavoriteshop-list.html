<div class="container-main">
    <div class="card main-content-body">
        <div class="card-header filter-card">
            <h1 class="table-title">N-UsersFavoriteShop</h1>
            <div class="func-wrapper">
                <button class="add-button btn-primary" (click)="addHandler()">Add</button> 
                <div class="filter-wrapper">
                    <div class="filter-inputgroup">
                        <input id="uid" class="filter-input" type="number" placeholder=" "
                            [value]="uidInput()" (input)="updateUid($any($event.target).value)" />
                        <label for="uid">uid</label>
                    </div>
                    <div class="filter-inputgroup">
                        <input id="shop_id" class="filter-input" type="number" placeholder=" "
                            [value]="shop_idInput()" (input)="updateShop_id($any($event.target).value)" />
                        <label for="shop_id">shop_id</label>
                    </div>
                    <button class="filter-btn" (click)="filterHandler()">Search</button>
                </div>
            </div>
        </div>
        <div class="card-body table-card">
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">UID</th>
                            <th scope="col">shop_id</th>
                            <th scope="col">create_date</th>
                            <th scope="col">shop_order</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>

                    <tbody>
                        @for (item of this.pageData(); track item.uid + '-' + item.shop_id) {
                            <tr>
                                <td>{{item.uid}}</td>
                                <td>{{item.shop_id}}</td>
                                <td>{{item.create_date}}</td>
                                <td>{{item.shop_order}}</td>
                                <td>
                                    <div class="btn-container cmd-btn">
                                        <button class="edit-btn" (click)="editHandler(item.uid.toString())">Edit</button>
                                        <button class="del-btn" (click)="deleteHandler(item.uid.toString())">Delete</button>                            
                                    </div>
                                </td>
                            </tr>
                        } 
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-action p-2 page-card-div">

            <div class="rpp-div">
                <span class="rpp-text">Result per page</span>
                <select class="rpp-dropdown" [value]="selectedPagesize()" (change)="onChangePagesize($event)">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                </select>
            </div>

            <div class="page-div">
                <button class="btn-page btn-primary" (click)="prevPage()" [disabled]="currentPage() === 1">
                    Previous
                </button>
                <span class="text-danger span-page-text">Page {{currentPage()}} of {{this.usersFavoriteShop.dataList().totalPages}}</span>
                <button class="btn-page btn-primary" (click)="nextPage()" [disabled]="currentPage() === this.usersFavoriteShop.dataList().totalPages">
                    Next
                </button>
            </div>

            <div class="page-input-div">
                <span class="span-page-go">Page</span>
                <input class="go-page-input" type="number" [value]="pageInput()" (input)="updateInputPage($any($event.target).value)" min="1"/>
                <button class="btn-go-page btn-primary" (click)="getPage()" [disabled]="currentPage() === this.usersFavoriteShop.dataList().totalPages">
                    Go
                </button>
            </div>
        </div>
    </div>
</div>
