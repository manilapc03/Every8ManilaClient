<div class="container-main">
    <div class="card main-content-body">
        <div class="card-header filter-card">
            <h1 class="table-title">N-UsersBlockShop</h1>
            <div class="func-wrapper">
                <button class="add-button btn-primary" (click)="addHandler()">Add</button> 
                <div class="filter-wrapper">
                    <select class="dd-filter-1" [value]="selectedSearchBy()" (change)="onChangeSearchBy($event)">
                        <!-- <option value="" selected disabled></option> -->
                        <option value="uid">uid</option>
                    </select>
                    <input class="filter-input" type="text" [value]="searchInput()" (input)="updateInputSearch($any($event.target).value)" />
                    <button class="filter-btn" (click)="filterHandler()">Search</button>
                </div>
            </div>
        </div>
        <div class="card-body table-card">
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">UID</th>
                            <th scope="col">gyousyu_id</th>
                            <th scope="col">gyousyu_group_id</th>
                            <th scope="col">shop_id</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>

                    <tbody>
                        @for (item of this.pageDataList(); track item.uid) {
                            <tr>
                                <td>{{item.uid}}</td>
                                <td>{{item.gyousyu_id}}</td>
                                <td>{{item.gyousyu_group_id}}</td>
                                <td>{{item.shop_id}}</td>
                                <td>
                                    <div class="btn-container cmd-btn">
                                        <button class="edit-btn" (click)="editHandler(item.uid)">Edit</button>
                                        <button class="del-btn" (click)="deleteHandler(item.uid)">Delete</button>                            
                                    </div>
                                </td>
                            </tr>
                        } 
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-action p-2 page-card-div">

            <div class="rpp-div">
                <span class="rpp-text">Result per page</span>
                <select class="rpp-dropdown" [value]="selectedPagesize()" (change)="onChangePagesize($event)">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                </select>
            </div>

            <div class="page-div">
                <button class="btn-page btn-primary" (click)="prevPage()" [disabled]="currentPage() === 1">
                    Previous
                </button>
                <span class="text-danger span-page-text">Page {{currentPage()}} of {{this.usersBlockShopService.dataList().totalPages}}</span>
                <button class="btn-page btn-primary" (click)="nextPage()" [disabled]="currentPage() === this.usersBlockShopService.dataList().totalPages">
                    Next
                </button>
            </div>

            <div class="page-input-div">
                <span class="span-page-go">Page</span>
                <input class="go-page-input" type="number" [value]="pageInput()" (input)="updateInputPage($any($event.target).value)" min="1" />
                <button class="btn-go-page btn-primary" (click)="getPage()" [disabled]="currentPage() === this.usersBlockShopService.dataList().totalPages">
                    Go
                </button>
            </div>
        </div>
    </div>
</div>
