<div class="dashboard">

    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="https://i.imgur.com/berYa9y.png" alt="" class="sb-logo">
        </div>

        <div class="sidebar-group">
            <div class="sidebar-item" routerLink="/home">
                    Home
                </div>
                
                <div class="sidebar-item dropdown-header" (click)="showTables = !showTables">
                    <span>List of Tables</span>
                    <span class="arrow" [class.open]="showTables">›</span>
                </div>

                @if(showTables) {
                <div class="sidebar-submenu">
                    <div class="sidebar-link" routerLink="/accesscountlist" routerLinkActive="sidebar-active">AccessCount</div>
                    <div class="sidebar-link" routerLink="/shopList" routerLinkActive="sidebar-active">Shop</div>
                    <div class="sidebar-link" routerLink="/userlist" routerLinkActive="sidebar-active">User</div>
                    <div class="sidebar-link" routerLink="/usersblockshoplist" routerLinkActive="sidebar-active">UsersBlockShop</div>
                    <div class="sidebar-link" routerLink="/usersfavoriteshoplist" routerLinkActive="sidebar-active">UsersFavoriteShop</div>
                </div>
                }
            </div>
    </div>

    <div class="main-area">

        <div class="top-navbar">
            <div class="nav-title">Dashboard</div>
            <button class="btn-logout" (click)="handlelogout()">Logout</button>
        </div>

        <div class="main-content">
            <router-outlet></router-outlet>
        </div>

    </div>
</div>
