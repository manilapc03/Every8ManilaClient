<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-logo">
            <img src="https://i.imgur.com/berYa9y.png" alt="" class="sb-logo">
        </div>

        <div class="sidebar-group">
            @if(this.authService.isLoggedIn()) {

            <div class="sidebar-item" (click)="handleHomePage()">
                Home
            </div>

            <div class="sidebar-item dropdown-header"
                (click)="showTables = !showTables">

                <span>List of Tables</span>

                <span class="arrow"
                    [class.open]="showTables">
                    ›
                </span>

            </div>

            @if(showTables) {

            <div class="sidebar-submenu">

                <div class="sidebar-link" (click)="handleAccessCountList()">
                    AccessCount
                </div>

                <div class="sidebar-link" (click)="handleShopList()">
                    Shop
                </div>

                <div class="sidebar-link" (click)="handleUserList()">
                    User
                </div>

                <div class="sidebar-link" (click)="handleUsersBlockShopList()">
                    UsersBlockShop
                </div>

            </div>

            }
        }
        </div>

    </div>

    <!-- MAIN AREA -->
    <div class="main-area">

        <!-- TOP NAVBAR -->
        <div class="top-navbar">
            <div class="nav-title">Dashboard</div>

            <button class="btn-logout" (click)="handlelogout()">Logout</button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

        </div>

    </div>

</div>
